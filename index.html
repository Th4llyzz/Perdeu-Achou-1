<!DOCTYPE html>
<html lang="pt-BR">
    
</head>
<body>
    <header class = "hero" id = "inicio" aria-label="Inicio">
        <!--links-->
        <nav class="nav">
            <a class="marca" href="#inicio">
                <img src="assets/logo-perdi-e-achei.svg" alt="" class="marca-img" />

            </a>
            <div class="nav-links" aria-label="Navegação Principal">
            <a href="#cadastro">Cadastrar</a>
            <a href="#registros">Registros</a>        
        </div>
        </nav>
        <!--Conteudo Central-->
        <section class="hero-conteudo">
            <div class="hero-texto">
                <h1>Perdeu? Achou? Registre aqui!</h1>
                <p>Um Central simples para Cadastrar objetos perdidos ou encontrados na Unipar.</p>
            
            <div class="acao">
            <!--Class = "btn btn-principal": encapsulamento de classes, classes complementares-->
                <a href="#cadastro" class="btn btn-principal">Cadastrar Objeto
                </a>
            </div>
            <a href="#registros" class="btn btn-secundario">Ver Registros
            </a>
            </div>
            </div>
            <!--barrra lateral do site-->
            <aside class="hero-card" aria-label="Resumo do Sistema">
                <img src="assets/hero-achados-perdidos.svg" alt="Ilustração de Objetos" />
                <div class="hero-metricas">
                    <!--Lembrança para o Futuro: o js vai atualiza isso-->
                    <div>
                        <strong id="totalRegistros">0</strong>
                        <span>Registros</span>
                    </div>
            </div>
            </aside>
        </section>
</header>
<main class="container">
    <section class="grid-principal">
        <!--article: artigo, "foco do site"-->
        <img src="assets/formulario.svg" alt="" />
        <div>
            <h2>Cadastro de Objeto</h2>
            <p>Informe os dados do objeto</p>
        </div>
    </div>
    <!--auto complete = off, nao sugere campos-->
    <form id="formObjeto" autocomplete="off">
        <label>Nome do Objeto</label>
        <input type="text" name="objeto" maxlength="80" placeholder="Ex. : Mochila, chave, carteira" />
        <!--vou criar uma div para dividir em colunas-->
        <div class="coluna-dois">
        <label>tipo</label>
        <!--campo de seleção-->
        <select name="tipo">
            <option value="">Selecione</option>
            <option value="perdido">Perdido</option>
            <option value="encontrado">Encontrado</option>
        </select>
        <label>Data</label>
        <input type="date" name="data" required />
        </div>
        <label>Local</label>
        <input type="text" name="local" maxlength="100" placeholder="Ex. : Laboratório 2, Bliblioteca, patio" required />
        <label>Descrição</label>
        <!--<textarea> permite texto longo e linhas-->
        <textarea name="descricao" maxlength="360" placeholder="Descreva cor, marca, detalhes...." required></textarea>
        <label>Contato</label>
        <input type="text" name="contato" maxlength="100"
        placeholder="Ex. : email, WhatsApp..." required /> 
    
        <button type="submit" class="btn btn-principal">Salvar</button>
    </form>
        </arcticle> 
    </section>
</main>
